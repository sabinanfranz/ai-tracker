<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 업데이트 트래커</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Layout: sidebar + main -->
  <div class="layout">
    <!-- Left Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <h1 class="sidebar__title">AI 업데이트 트래커</h1>
      </div>

      <!-- Product toggles -->
      <div class="sidebar__section">
        <span class="sidebar__section-label">제품</span>
        <div class="sidebar__products" id="product-filters"></div>
      </div>

      <!-- Filter status -->
      <div class="sidebar__section">
        <span class="filter-status" id="filter-status"></span>
      </div>

      <!-- Hidden: jump controls container (kept for JS compatibility) -->
      <div id="jump-controls" style="display:none"></div>

      <!-- Hidden: tag filters container (kept for JS compatibility) -->
      <div id="tag-filters" style="display:none"></div>
    </aside>

    <!-- Mobile sidebar toggle -->
    <button class="mobile-sidebar-toggle" id="mobile-filter-toggle" aria-label="메뉴 열기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="filter-overlay"></div>

    <!-- Right Main Content -->
    <main class="main-content">
      <!-- Rail Header (sticky product columns) -->
      <div class="rail-header" id="rail-header">
        <div class="rail-header__axis"></div>
        <div class="rail-header__label" data-product="chatgpt">
          <span class="rail-header__dot" style="background:var(--color-chatgpt)"></span>
          ChatGPT
        </div>
        <div class="rail-header__label" data-product="gemini">
          <span class="rail-header__dot" style="background:var(--color-gemini)"></span>
          Gemini
        </div>
        <div class="rail-header__label" data-product="codex">
          <span class="rail-header__dot" style="background:var(--color-codex)"></span>
          Codex
        </div>
        <div class="rail-header__label" data-product="claude_code">
          <span class="rail-header__dot" style="background:var(--color-claude-code)"></span>
          Claude Code
        </div>
      </div>

      <!-- Timeline Grid -->
      <div class="timeline-grid" id="timeline"></div>
      <div class="timeline__loader" id="loader" style="display:none">
        <div class="loader-spinner"></div>
        <span>이벤트를 불러오는 중...</span>
      </div>
      <div class="timeline__end" id="end-message" style="display:none">
        더 이상 표시할 이벤트가 없습니다
      </div>
      <div class="timeline__empty" id="empty-state" style="display:none">
        <div class="empty-icon">&#8709;</div>
        <h2>검색 결과가 없습니다</h2>
        <p>선택한 필터 조건에 맞는 이벤트가 없습니다.</p>
        <ul class="empty-suggestions">
          <li>제품 필터 해제하기</li>
          <li>날짜 범위 넓히기</li>
        </ul>
        <div class="empty-actions">
          <button class="btn btn--primary" id="reset-filters">모든 필터 초기화</button>
        </div>
      </div>

      <!-- Error State -->
      <div class="timeline__error" id="error-state" style="display:none">
        <div class="error-icon">!</div>
        <h2>문제가 발생했습니다</h2>
        <p class="error-message" id="error-message">타임라인 데이터를 불러오지 못했습니다.</p>
        <p class="error-hint">네트워크 연결 문제이거나 서버 오류일 수 있습니다.</p>
        <div class="error-actions">
          <button class="btn btn--primary" id="retry-btn">다시 시도</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Event Detail Modal -->
  <div class="modal-overlay" id="event-modal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal__close" aria-label="닫기">&times;</button>
      <div class="modal__header"></div>
      <div class="modal__body"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/cards/base.js"></script>
  <script src="/js/cards/chatgpt.js"></script>
  <script src="/js/cards/codex.js"></script>
  <script src="/js/cards/gemini.js"></script>
  <script src="/js/cards/claude-code.js"></script>
  <script src="/js/card.js"></script>
  <script src="/js/filters.js"></script>
  <script src="/js/timeline.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
